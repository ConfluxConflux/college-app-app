{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Focus — HIPPOCAMPUS{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <style>
    html { background: white; }
    .focus-shell { max-width: 95%; padding: 0 1.5rem 1rem; }
    .focus-topbar { background: rgba(255,255,255,0.95); }
  </style>
  {% block extra_head %}{% endblock %}
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="focus-mode">
  {% block content %}{% endblock %}

  {% block extra_js %}{% endblock %}
  <script>
    document.body.addEventListener('htmx:configRequest', function(evt) {
      evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
  </script>
</body>
</html>
