{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}College App App{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body>
  <nav class="navbar is-dark" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <a class="navbar-item has-text-weight-bold" href="{% url 'core:home' %}">
        College App App
      </a>
      <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false"
         data-target="mainNav" x-data x-on:click="$el.classList.toggle('is-active'); document.getElementById('mainNav').classList.toggle('is-active')">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>
    <div id="mainNav" class="navbar-menu">
      <div class="navbar-start">
        <a class="navbar-item {% if request.resolver_match.app_name == 'core' %}is-active{% endif %}"
           href="{% url 'core:home' %}">
          Dashboard
        </a>
        <a class="navbar-item {% if request.resolver_match.app_name == 'colleges' %}is-active{% endif %}"
           href="{% url 'colleges:list' %}">
          Colleges
        </a>
        <a class="navbar-item {% if request.resolver_match.app_name == 'activities' %}is-active{% endif %}"
           href="{% url 'activities:home' %}">
          Activities
        </a>
        <a class="navbar-item {% if request.resolver_match.app_name == 'supplements' %}is-active{% endif %}"
           href="{% url 'supplements:home' %}">
          Supplements
        </a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container is-fluid">
      {% block content %}{% endblock %}
    </div>
  </section>

  {% block extra_js %}{% endblock %}
</body>
</html>
