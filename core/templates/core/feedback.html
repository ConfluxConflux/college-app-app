{% extends "base.html" %}

{% block title %}Feedback - College App App{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 4rem auto; text-align: center;">
  <p class="subtitle" style="margin-bottom: 2.5rem;">If you're frustrated with literally anything, the fix may be only one Claude prompt away!</p>

  <div style="display: flex; flex-direction: column; gap: 1.5rem; align-items: center;">
    <a href="https://tinyurl.com/caa-feedback-form" target="_blank" rel="noopener noreferrer"
       style="font-family: 'Libre Baskerville', Georgia, serif; font-size: 2rem; font-weight: 700; padding: 1rem 2.5rem; border-radius: 9999px; background: var(--bulma-primary, #00d1b2); color: #fff; text-decoration: none; border: 3px solid transparent; display: inline-block; transition: opacity 0.15s;">
      Feedback Form
    </a>

    <a href="mailto:chromaticconflux@gmail.com?subject=College%20App%20App%20Feedback&body=Hey%20Jacob!%20This%20is%20just%20a%20quick%20email%20with%20some%20quick%20feedback%20about%20the%20College%20App%20App.%20I%27m%20not%20gonna%20be%20perfectionistic%2C%20I%27m%20just%20gonna%20quickly%20write%20my%20feedback%20and%20then%20hit%20send"
       style="font-family: 'Libre Baskerville', Georgia, serif; font-size: 1.4rem; font-weight: 400; padding: 0.75rem 2rem; border-radius: 9999px; background: transparent; color: #1a1a1a; text-decoration: none; border: 2px solid #aaa; display: inline-block; transition: background 0.15s, color 0.15s;">
      Email Jacob
    </a>
  </div>
</div>
{% endblock %}
