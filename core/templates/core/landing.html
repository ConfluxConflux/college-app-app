{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The College App App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --periwinkle-light: #e4f4f2;
      --periwinkle-dark: #2a9d8f;
    }

    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: radial-gradient(ellipse at 35% 25%, #bde4df 0%, var(--periwinkle-light) 65%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 8vh;
    }

    footer {
      margin-top: auto;
      padding: 2rem;
      font-size: 0.9rem;
      font-style: italic;
      color: #888;
      text-align: center;
    }

    .center {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: -0.75rem;
    }

    .tagline {
      font-size: 1.75rem;
      color: #666;
      font-style: italic;
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 8vh;
      align-items: center;
    }

    .btn {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 2.1rem;
      font-weight: 700;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      border: 3px solid #1a1a1a;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      display: inline-block;
    }

    .btn-primary {
      background: var(--periwinkle-dark);
      border-color: var(--periwinkle-dark);
      color: #fff;
    }
    .btn-primary:hover {
      background: #228879;
      border-color: #228879;
    }

    .btn-secondary {
      background: transparent;
      color: #1a1a1a;
    }
    .btn-secondary:hover {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="center">
    <h1>The College App App</h1>
    <p class="tagline">An actually-good interface for managing college apps.<br>In theory, anyway ...</p>
    <div class="buttons">
      <a href="{% url 'core:home' %}" class="btn btn-primary">View as test user</a>
      <a href="{% url 'core:login' %}" class="btn btn-secondary">Log in</a>
      <a href="{% url 'core:signup' %}" class="btn btn-secondary">Sign up</a>
    </div>
  </div>
  <footer>Made by Jacob Cohen with Claude Code and a passionate hatred of the college application industrial complex</footer>
</body>
</html>
