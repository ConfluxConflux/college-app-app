{% load static %}
{# Usage: {% include "core/_avatar.html" with size=32 %} — size in px #}
{% if applicant.profile_picture %}
<img src="{{ applicant.profile_picture }}"
     alt="{{ applicant.first_name }}"
     style="width:{{ size }}px;height:{{ size }}px;border-radius:50%;object-fit:cover;display:block;flex-shrink:0;">
{% else %}
<svg width="{{ size }}" height="{{ size }}" viewBox="0 0 {{ size }} {{ size }}" xmlns="http://www.w3.org/2000/svg"
     style="display:block;flex-shrink:0;">
  <circle cx="{% widthratio size 2 1 %}" cy="{% widthratio size 2 1 %}" r="{% widthratio size 2 1 %}" fill="#5bc8b8"/>
  <text x="50%" y="50%"
        dominant-baseline="central"
        text-anchor="middle"
        font-family="'Open Sans', sans-serif"
        font-weight="600"
        font-size="{% widthratio size 2 1 %}"
        fill="white">{{ applicant.first_name|slice:":1"|upper }}</text>
</svg>
{% endif %}
