{% extends "base.html" %}

{% block title %}Advice - College App App{% endblock %}

{% block content %}
<div class="tabs is-boxed is-medium">
  <ul>
    <li>
      <a href="{% url 'widgets:estimator' %}">Time Estimator</a>
    </li>
    <li>
      <a href="{% url 'widgets:focus_write' %}">Focus Write</a>
    </li>
    <li>
      <a href="{% url 'widgets:word_counter' %}">Word Counter</a>
    </li>
    <li class="is-active">
      <a href="{% url 'widgets:advice' %}">Advice</a>
    </li>
    <li>
      <a href="{% url 'widgets:resources' %}">Resources</a>
    </li>
  </ul>
</div>

<div style="max-width:680px;">
  {% for link in links %}
  <a href="{{ link.url }}" target="_blank" rel="noopener"
     style="display:block; text-decoration:none; color:inherit; padding:1rem 0; border-bottom:1px solid #e8e8e8;">
    <div style="font-family:'Libre Baskerville', Georgia, serif; font-size:1.1rem; font-weight:700; color:#222; margin-bottom:0.2rem;">
      {{ link.title }}
    </div>
    <div style="font-size:0.8rem; color:#aaa;">{{ link.source }}</div>
  </a>
  {% endfor %}
</div>
{% endblock %}
