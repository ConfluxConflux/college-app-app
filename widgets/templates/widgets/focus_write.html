{% extends "focus_base.html" %}

{% block title %}Focus Write — College App App{% endblock %}

{% block content %}
<div class="focus-shell"
     x-data="{
       text: '',
       showCount: false,
       fs: false,
       showBackPrompt: false,
       copied: false,
       get wc() { return this.text.trim() ? this.text.trim().split(/\s+/).length : 0; },
       get cc() { return this.text.length; },
       toggleFs() {
         if (!document.fullscreenElement) {
           document.documentElement.requestFullscreen();
         } else {
           document.exitFullscreen();
         }
       },
       goBack() {
         window.location.href = '{% url 'widgets:home' %}';
       },
       copyText() {
         navigator.clipboard.writeText(this.text).then(() => { this.copied = true; });
       },
     }"
     x-init="document.addEventListener('fullscreenchange', () => { fs = !!document.fullscreenElement; })">

  <!-- Back confirmation prompt -->
  <div x-show="showBackPrompt" @click.self="showBackPrompt = false" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;">
    <div style="position:relative;background:#fff;border-radius:12px;padding:2rem;max-width:360px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2);font-family:'Libre Baskerville',Georgia,serif;">
      <button @click="showBackPrompt = false" style="position:absolute;top:0.6rem;right:0.75rem;background:none;border:none;font-size:1.2rem;line-height:1;color:#9ca3af;cursor:pointer;font-family:'Libre Baskerville',Georgia,serif;" aria-label="Dismiss">&times;</button>
      <p style="font-size:1.1rem;font-weight:600;margin:0 0 0.5rem;">Copy your writing<br>somewhere else!</p>
      <p style="font-size:0.9rem;color:#666;margin:0 0 1.5rem;font-style:italic;">Your text won't be saved<br>when you leave.</p>
      <div style="display:flex;gap:0.75rem;justify-content:center;">
        <div style="position:relative;">
          <button @click="copyText()" style="background:#f3f4f6;color:#374151;border:none;border-radius:8px;padding:0.6rem 1.25rem;font-size:0.95rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Libre Baskerville',Georgia,serif;">Ok wait lemme do that</button>
          <span x-show="copied" style="position:absolute;left:50%;transform:translateX(-50%);top:calc(100% + 0.3rem);font-size:0.8rem;color:#16a34a;white-space:nowrap;">Copied to clipboard!</span>
        </div>
        <button @click="goBack()" style="background:#2563eb;color:#fff;border:none;border-radius:8px;padding:0.6rem 1.25rem;font-size:0.95rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Libre Baskerville',Georgia,serif;">I did</button>
      </div>
    </div>
  </div>

  <!-- Back bar -->
  <div class="focus-topbar">
    <button @click="text.length >= 2 ? showBackPrompt = true : goBack()" class="focus-back-btn">← Back</button>
    <span class="focus-college-label">Focus Write</span>
    <div style="display:flex; align-items:center; gap:0.75rem;">
      <span x-show="showCount" class="focus-counter" style="font-size:0.8rem;">
        <span x-text="wc + (wc === 1 ? ' word' : ' words')"></span> &nbsp;·&nbsp; <span x-text="cc + (cc === 1 ? ' char' : ' chars')"></span>
      </span>
      <button class="focus-back-btn" @click="showCount = !showCount" x-text="showCount ? 'Hide Word Count' : 'Show Word Count'"></button>
      <button class="focus-back-btn" @click="toggleFs()" x-text="fs ? '⤡ Exit Fullscreen' : '⤢ Fullscreen'"></button>
    </div>
  </div>

  <!-- Editor -->
  <div class="focus-editor-area">
    <textarea
      class="focus-textarea"
      placeholder="Start writing…"
      x-model="text"
      x-init="$el.style.height = Math.max($el.scrollHeight, 320) + 'px'"
      @input="$el.style.height = 'auto'; $el.style.height = $el.scrollHeight + 'px'"
      spellcheck="true"
      autocomplete="off"
    ></textarea>
  </div>

</div>
{% endblock %}
