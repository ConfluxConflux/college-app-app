{% extends "base.html" %}

{% block title %}Word Counter - College App App{% endblock %}

{% block content %}
<div class="tabs is-boxed is-medium">
  <ul>
    <li>
      <a href="{% url 'widgets:estimator' %}">Estimator</a>
    </li>
    <li>
      <a href="{% url 'widgets:focus_write' %}">Focus Write</a>
    </li>
    <li class="is-active">
      <a href="{% url 'widgets:word_counter' %}">Word Counter</a>
    </li>
  </ul>
</div>

<div x-data="{
  text: '',
  get wc() { return this.text.trim() ? this.text.trim().split(/\s+/).length : 0; },
  get cc() { return this.text.length; },
}">

  <!-- Count banner -->
  <div style="background:#e8f4f2; border-radius:6px 6px 0 0; padding:0.65rem 1rem; display:flex; align-items:baseline; gap:0.35rem; font-family:'Libre Baskerville', Georgia, serif;">
    <span style="font-size:2.4rem; font-weight:700; line-height:1;" x-text="wc"></span>
    <span style="font-size:2.4rem; color:#555; margin-right:0.75rem; font-style:italic;" x-text="wc === 1 ? 'word' : 'words'"></span>
    <span style="font-size:2rem; color:#aaa; margin-right:0.75rem;">·</span>
    <span style="font-size:2.4rem; font-weight:700; line-height:1;" x-text="cc"></span>
    <span style="font-size:2.4rem; color:#555; font-style:italic;" x-text="cc === 1 ? 'character' : 'characters'"></span>
  </div>

  <!-- Textarea -->
  <textarea
    class="textarea"
    rows="14"
    placeholder="Paste or type your text here…"
    x-model="text"
    spellcheck="false"
    style="font-size:0.95rem; resize:vertical; border-radius:0 0 6px 6px; border-top:none;"
  ></textarea>

</div>
{% endblock %}
