<tr id="uc-slot-{{ slot_num }}" class="uc-placeholder">
  <td style="width:18px"></td>
  <td class="is-size-7" style="width:28px">{{ slot_num }}</td>

  {# Name #}
  <td style="cursor:pointer; min-width:140px"
      hx-post="{% url 'activities:uc_slot_add' slot_num %}"
      hx-vals='{"field": "name"}'
      hx-target="#uc-slot-{{ slot_num }}"
      hx-swap="outerHTML">—</td>

  {# Category #}
  <td style="cursor:pointer"
      hx-post="{% url 'activities:uc_slot_add' slot_num %}"
      hx-vals='{"field": "category"}'
      hx-target="#uc-slot-{{ slot_num }}"
      hx-swap="outerHTML">—</td>

  {# Background #}
  <td style="cursor:pointer; min-width:200px"
      hx-post="{% url 'activities:uc_slot_add' slot_num %}"
      hx-vals='{"field": "background"}'
      hx-target="#uc-slot-{{ slot_num }}"
      hx-swap="outerHTML">—</td>

  {# Description #}
  <td style="cursor:pointer; min-width:220px"
      hx-post="{% url 'activities:uc_slot_add' slot_num %}"
      hx-vals='{"field": "description"}'
      hx-target="#uc-slot-{{ slot_num }}"
      hx-swap="outerHTML">—</td>

  {# Grades #}
  <td style="cursor:pointer"
      hx-post="{% url 'activities:uc_slot_add' slot_num %}"
      hx-vals='{"field": "grades"}'
      hx-target="#uc-slot-{{ slot_num }}"
      hx-swap="outerHTML">—</td>

  {# Hrs/wk #}
  <td style="width:70px; cursor:pointer"
      hx-post="{% url 'activities:uc_slot_add' slot_num %}"
      hx-vals='{"field": "hours_per_week"}'
      hx-target="#uc-slot-{{ slot_num }}"
      hx-swap="outerHTML">—</td>

  {# Wks/yr #}
  <td style="width:70px; cursor:pointer"
      hx-post="{% url 'activities:uc_slot_add' slot_num %}"
      hx-vals='{"field": "weeks_per_year"}'
      hx-target="#uc-slot-{{ slot_num }}"
      hx-swap="outerHTML">—</td>

  {# Notes #}
  <td style="cursor:pointer; min-width:140px"
      hx-post="{% url 'activities:uc_slot_add' slot_num %}"
      hx-vals='{"field": "personal_notes"}'
      hx-target="#uc-slot-{{ slot_num }}"
      hx-swap="outerHTML">—</td>

  {# Hub — not clickable #}
  <td>—</td>

  {# No delete button on empty row #}
  <td style="width:40px"></td>
</tr>
