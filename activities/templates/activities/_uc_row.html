<tr id="uc-{{ entry.pk }}" data-pk="{{ entry.pk }}" class="uc-cat-{{ entry.category }}"
    style="--bulma-table-cell-background-color:transparent;{% if entry.category == 'award' %}background-color:#fef9c3{% elif entry.category == 'extracurricular' %}background-color:#dbeafe{% elif entry.category == 'volunteer' %}background-color:#dcfce7{% elif entry.category == 'work' %}background-color:#ffedd5{% elif entry.category == 'coursework' %}background-color:#ede9fe{% endif %}">
  <td class="drag-handle" style="width:18px">⠿</td>
  <td class="has-text-grey is-size-7" style="width:28px">{{ slot_num|default:entry.order }}</td>

  {# Name #}
  <td style="min-width:140px" x-data="{ e:false, v:'{{ entry.name|escapejs }}' }">
    <strong x-show="!e" @click="e=true; $nextTick(()=>$refs.i.focus())" style="cursor:pointer; display:block; min-height:1.2em" x-text="v||'—'"></strong>
    <input x-show="e" x-ref="i" class="input is-small" type="text" name="value" x-model="v" maxlength="100"
      hx-post="{% url 'activities:uc_cell' entry.pk 'name' %}" hx-trigger="blur" hx-swap="none"
      @blur="e=false">
  </td>

  {# Category — swap outerHTML so row background color updates #}
  <td>
    <form hx-post="{% url 'activities:uc_cell' entry.pk 'category' %}" hx-trigger="change" hx-target="#uc-{{ entry.pk }}" hx-swap="outerHTML">
      <div class="select is-small"><select name="value">
        {% for val, label in uc_category_choices %}
        <option value="{{ val }}" {% if entry.category == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select></div>
    </form>
  </td>

  {# Background (250ch) #}
  <td style="min-width:200px" x-data="{
    e:false, v:'{{ entry.background|escapejs }}',
    get chars(){ return this.v.length; },
    cc(l){ var r=this.chars/l; return r>1?'has-text-danger has-text-weight-semibold':r>=0.9?'has-text-warning-dark':'has-text-grey'; }
  }">
    <div x-show="!e" @click="e=true; $nextTick(()=>$refs.t.focus())" class="is-size-7" style="cursor:pointer; white-space:pre-wrap; min-height:1.2em" x-text="v||'—'"></div>
    <div x-show="e">
      <textarea x-ref="t" class="textarea is-small" name="value" rows="3" x-model="v" maxlength="250"
        hx-post="{% url 'activities:uc_cell' entry.pk 'background' %}" hx-trigger="blur, input delay:1500ms" hx-swap="none"
        @blur="e=false"></textarea>
      <p style="text-align:right;margin-top:0.25rem;font-size:0.75rem;line-height:1;"><span :class="cc(250)" x-text="chars+' / 250 chars'"></span></p>
    </div>
  </td>

  {# Description (350ch) #}
  <td style="min-width:220px" x-data="{
    e:false, v:'{{ entry.description|escapejs }}',
    get chars(){ return this.v.length; },
    cc(l){ var r=this.chars/l; return r>1?'has-text-danger has-text-weight-semibold':r>=0.9?'has-text-warning-dark':'has-text-grey'; }
  }">
    <div x-show="!e" @click="e=true; $nextTick(()=>$refs.t.focus())" class="is-size-7" style="cursor:pointer; white-space:pre-wrap; min-height:1.2em" x-text="v||'—'"></div>
    <div x-show="e">
      <textarea x-ref="t" class="textarea is-small" name="value" rows="3" x-model="v" maxlength="350"
        hx-post="{% url 'activities:uc_cell' entry.pk 'description' %}" hx-trigger="blur, input delay:1500ms" hx-swap="none"
        @blur="e=false"></textarea>
      <p style="text-align:right;margin-top:0.25rem;font-size:0.75rem;line-height:1;"><span :class="cc(350)" x-text="chars+' / 350 chars'"></span></p>
    </div>
  </td>

  {# Grades #}
  <td>
    <form hx-post="{% url 'activities:uc_cell' entry.pk 'grades' %}" hx-trigger="change" hx-swap="none">
      <div class="is-size-7" style="white-space:nowrap">
        <label><input type="checkbox" name="grade_9" {% if entry.grade_9 %}checked{% endif %}> 9</label>&nbsp;
        <label><input type="checkbox" name="grade_10" {% if entry.grade_10 %}checked{% endif %}> 10</label>&nbsp;
        <label><input type="checkbox" name="grade_11" {% if entry.grade_11 %}checked{% endif %}> 11</label>&nbsp;
        <label><input type="checkbox" name="grade_12" {% if entry.grade_12 %}checked{% endif %}> 12</label>
      </div>
    </form>
  </td>

  {# Hrs/wk #}
  <td style="width:70px" x-data="{ e:false, v:'{{ entry.hours_per_week|escapejs }}' }">
    <span x-show="!e" @click="e=true; $nextTick(()=>$refs.i.focus())" style="cursor:pointer; display:block; min-height:1.2em" x-text="v||'—'"></span>
    <input x-show="e" x-ref="i" class="input is-small" type="text" name="value" x-model="v" style="width:55px"
      hx-post="{% url 'activities:uc_cell' entry.pk 'hours_per_week' %}" hx-trigger="blur" hx-swap="none"
      @blur="e=false">
  </td>

  {# Wks/yr #}
  <td style="width:70px" x-data="{ e:false, v:'{{ entry.weeks_per_year|escapejs }}' }">
    <span x-show="!e" @click="e=true; $nextTick(()=>$refs.i.focus())" style="cursor:pointer; display:block; min-height:1.2em" x-text="v||'—'"></span>
    <input x-show="e" x-ref="i" class="input is-small" type="text" name="value" x-model="v" style="width:55px"
      hx-post="{% url 'activities:uc_cell' entry.pk 'weeks_per_year' %}" hx-trigger="blur" hx-swap="none"
      @blur="e=false">
  </td>

  {# Notes #}
  <td style="min-width:140px" x-data="{ e:false, v:'{{ entry.personal_notes|escapejs }}' }">
    <span x-show="!e" @click="e=true; $nextTick(()=>$refs.i.focus())" class="is-size-7" style="cursor:pointer; display:block; min-height:1.2em" x-text="v||'—'"></span>
    <input x-show="e" x-ref="i" class="input is-small" type="text" name="value" x-model="v"
      hx-post="{% url 'activities:uc_cell' entry.pk 'personal_notes' %}" hx-trigger="blur" hx-swap="none"
      @blur="e=false">
  </td>

  {# Delete #}
  <td style="width:40px">
    <button class="button is-small is-danger is-outlined" hx-post="{% url 'activities:uc_delete' entry.pk %}" hx-target="#uc-{{ entry.pk }}" hx-swap="outerHTML" hx-confirm="Delete this UC entry?">&times;</button>
  </td>
</tr>
