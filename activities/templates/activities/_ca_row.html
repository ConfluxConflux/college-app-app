<tr id="ca-{{ activity.pk }}">
  <td class="has-text-grey is-size-7" style="width:30px">{{ activity.order }}</td>

  {# Type #}
  <td>
    <form hx-post="{% url 'activities:ca_cell' activity.pk 'activity_type' %}" hx-trigger="change" hx-swap="none">
      <div class="select is-small"><select name="value">
        {% for val, label in ca_type_choices %}
        <option value="{{ val }}" {% if activity.activity_type == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select></div>
    </form>
  </td>

  {# Position (50ch) #}
  <td style="min-width:120px" x-data="{ e:false, v:'{{ activity.position|escapejs }}' }">
    <span x-show="!e" @click="e=true; $nextTick(()=>$refs.i.focus())" style="cursor:pointer; display:block; min-height:1.2em" x-text="v||'—'"></span>
    <input x-show="e" x-ref="i" class="input is-small" type="text" name="value" x-model="v" maxlength="50"
      hx-post="{% url 'activities:ca_cell' activity.pk 'position' %}" hx-trigger="blur" hx-swap="none"
      @blur="e=false">
  </td>

  {# Organization (100ch) #}
  <td style="min-width:140px" x-data="{ e:false, v:'{{ activity.organization|escapejs }}' }">
    <strong x-show="!e" @click="e=true; $nextTick(()=>$refs.i.focus())" style="cursor:pointer; display:block; min-height:1.2em" x-text="v||'—'"></strong>
    <input x-show="e" x-ref="i" class="input is-small" type="text" name="value" x-model="v" maxlength="100"
      hx-post="{% url 'activities:ca_cell' activity.pk 'organization' %}" hx-trigger="blur" hx-swap="none"
      @blur="e=false">
  </td>

  {# Description (150ch) #}
  <td style="min-width:200px" x-data="{
    e:false, v:'{{ activity.description|escapejs }}',
    get chars(){ return this.v.length; },
    cc(l){ var r=this.chars/l; return r>1?'has-text-danger has-text-weight-semibold':r>=0.9?'has-text-warning-dark':'has-text-grey'; }
  }">
    <div x-show="!e" @click="e=true; $nextTick(()=>$refs.t.focus())" class="is-size-7" style="cursor:pointer; white-space:pre-wrap; min-height:1.2em" x-text="v||'—'"></div>
    <div x-show="e">
      <textarea x-ref="t" class="textarea is-small" name="value" rows="3" x-model="v" maxlength="150"
        hx-post="{% url 'activities:ca_cell' activity.pk 'description' %}" hx-trigger="blur, input delay:1500ms" hx-swap="none"
        @blur="e=false"></textarea>
      <p style="text-align:right;margin-top:0.25rem;font-size:0.75rem;line-height:1;"><span :class="cc(150)" x-text="chars+' / 150 chars'"></span></p>
    </div>
  </td>

  {# Grades #}
  <td>
    <form hx-post="{% url 'activities:ca_cell' activity.pk 'grades' %}" hx-trigger="change" hx-swap="none">
      <div class="is-size-7" style="white-space:nowrap">
        <label><input type="checkbox" name="grade_9" {% if activity.grade_9 %}checked{% endif %}> 9</label>&nbsp;
        <label><input type="checkbox" name="grade_10" {% if activity.grade_10 %}checked{% endif %}> 10</label>&nbsp;
        <label><input type="checkbox" name="grade_11" {% if activity.grade_11 %}checked{% endif %}> 11</label>&nbsp;
        <label><input type="checkbox" name="grade_12" {% if activity.grade_12 %}checked{% endif %}> 12</label>
      </div>
    </form>
  </td>

  {# Timing #}
  <td>
    <form hx-post="{% url 'activities:ca_cell' activity.pk 'timing' %}" hx-trigger="change" hx-swap="none">
      <div class="is-size-7" style="white-space:nowrap">
        <label><input type="checkbox" name="timing_school" {% if activity.timing_school %}checked{% endif %}> School</label>&nbsp;
        <label><input type="checkbox" name="timing_breaks" {% if activity.timing_breaks %}checked{% endif %}> Breaks</label>&nbsp;
        <label><input type="checkbox" name="timing_all_year" {% if activity.timing_all_year %}checked{% endif %}> All year</label>
      </div>
    </form>
  </td>

  {# Hrs/wk #}
  <td style="width:70px" x-data="{ e:false, v:'{{ activity.hours_per_week|default:''|escapejs }}' }">
    <span x-show="!e" @click="e=true; $nextTick(()=>$refs.i.focus())" style="cursor:pointer; display:block; min-height:1.2em" x-text="v||'—'"></span>
    <input x-show="e" x-ref="i" class="input is-small" type="number" name="value" x-model="v" style="width:55px"
      hx-post="{% url 'activities:ca_cell' activity.pk 'hours_per_week' %}" hx-trigger="blur" hx-swap="none"
      @blur="e=false">
  </td>

  {# Hub (read-only) #}
  <td class="is-size-7">{% if activity.core_activity %}<span class="tag is-light is-small" title="{{ activity.core_activity.name }}">{{ activity.core_activity.name|truncatewords:3 }}</span>{% else %}—{% endif %}</td>

  {# Delete #}
  <td style="width:40px">
    <button class="button is-small is-danger is-outlined" hx-post="{% url 'activities:ca_delete' activity.pk %}" hx-target="#ca-{{ activity.pk }}" hx-swap="outerHTML" hx-confirm="Delete this activity?">&times;</button>
  </td>
</tr>
