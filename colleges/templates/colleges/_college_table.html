<div class="table-container">
  <table class="table is-bordered is-hoverable is-fullwidth is-narrow">
    <thead>
      <tr>
        {% for field_name, field_label in table_fields %}
        <th class="col-{{ field_name }}"
            style="white-space:nowrap;{% if field_name in optional_field_names %} display:none;{% endif %}">
          <a hx-get="{{ tab_url }}?sort={{ field_name }}&dir={% if sort == field_name and sort_dir == 'asc' %}desc{% else %}asc{% endif %}{% if search %}&q={{ search }}{% endif %}"
             hx-target="#college-table-wrapper"
             hx-push-url="true"
             class="has-text-dark"
             style="text-decoration:none;">
            {{ field_label }}
            {% if sort == field_name %}{% if sort_dir == 'asc' %}&#9650;{% else %}&#9660;{% endif %}{% endif %}
          </a>
        </th>
        {% endfor %}
      </tr>
    </thead>
    <tbody id="college-tbody">
      {% for college in colleges %}
        {% include "colleges/_college_row.html" %}
      {% empty %}
      <tr>
        <td colspan="{{ table_fields|length }}" class="has-text-centered has-text-grey py-5">
          No colleges match your filters.
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
