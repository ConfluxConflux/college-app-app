{% extends "base.html" %}

{% block title %}Applications - College App App{% endblock %}

{% block content %}

<div class="select" style="font-size:2rem; font-family:'Libre Baskerville',Georgia,serif; margin-bottom:2rem;">
  <select style="font-size:inherit; font-family:inherit; height:auto; padding:0.25rem 3rem 0.25rem 0.75rem; font-weight:bold;"
          onchange="if(this.value) window.location='?college='+this.value">
    <option value="" {% if not selected %}selected{% endif %} disabled>— Select a college —</option>
    {% for college in colleges %}
    <option value="{{ college.pk }}" {% if selected.pk == college.pk %}selected{% endif %}>
      {{ college.name }} Application Progress
    </option>
    {% endfor %}
  </select>
</div>

{% if selected %}
<div class="mt-4">
  {# Content for {{ selected.name }} goes here #}
</div>
{% endif %}

{% endblock %}
