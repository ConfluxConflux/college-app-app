{% extends "base.html" %}

{% block title %}Applications - College App App{% endblock %}

{% block content %}

<div style="display:flex; align-items:baseline; gap:0.75em; margin-bottom:2rem;">
  <h1 class="title mb-0" style="white-space:nowrap;">Application Progress:</h1>
  <div class="select" style="font-size:2rem; font-family:'Libre Baskerville',Georgia,serif; flex:1;">
    <select id="college-select"
            style="font-size:inherit; font-family:inherit; font-weight:bold; height:auto; padding:0.15rem 3.5rem 0.15rem 0.5rem; width:100%;"
            onchange="if(this.value){ localStorage.setItem('applications_college', this.value); window.location='?college='+this.value; }">
      <option value="" {% if not selected %}selected{% endif %} disabled>[select college]</option>
      {% for college in colleges %}
      <option value="{{ college.pk }}" {% if selected.pk == college.pk %}selected{% endif %}>{{ college.name }}</option>
      {% endfor %}
    </select>
  </div>
  {% if selected %}
  <div x-data="{ s: '{{ selected.apply_status }}' }" style="flex-shrink:0;">
    <select x-model="s" :class="'status-' + s" name="value"
            hx-post="{% url 'colleges:edit_cell' selected.pk 'apply_status' %}"
            hx-trigger="change" hx-swap="none"
            style="font-size:2rem; font-weight:600; padding:0.15rem 1.25rem; border-radius:999px; border:1px solid rgba(0,0,0,0.12); cursor:pointer; height:auto; -webkit-appearance:none; appearance:none;">
      {% for val, label in status_choices %}
      <option value="{{ val }}" {% if val == selected.apply_status %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  {% endif %}
</div>

{% if selected %}
<div class="mt-4">
  {# Content for {{ selected.name }} goes here #}
</div>
{% endif %}

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('college')) {
    const stored = localStorage.getItem('applications_college');
    if (stored) window.location = '?college=' + stored;
  }
});
</script>
{% endblock %}
