{% extends "base.html" %}

{% block title %}Add College - HIPPOCAMPUS{% endblock %}

{% block content %}
<nav class="breadcrumb" aria-label="breadcrumbs">
  <ul>
    <li><a href="{% url 'colleges:list' %}">Colleges</a></li>
    <li class="is-active"><a href="#">Add College</a></li>
  </ul>
</nav>

<h1 class="title">Add College</h1>

<form method="post">
  {% csrf_token %}
  <div class="box">
    <div class="columns is-multiline">
      {% for field in form %}
      <div class="column {% if field.name in 'applicant_notes,parent_notes,random_notes,known_students,known_faculty,portal_info' %}is-4{% elif field.name == 'name' %}is-6{% else %}is-3{% endif %}">
        <div class="field">
          <label class="label is-small">{{ field.label }}</label>
          <div class="control">{{ field }}</div>
          {% if field.errors %}<p class="help is-danger">{{ field.errors.0 }}</p>{% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="field is-grouped">
    <div class="control">
      <button type="submit" class="button is-primary">Add College</button>
    </div>
    <div class="control">
      <a href="{% url 'colleges:list' %}" class="button is-light">Cancel</a>
    </div>
  </div>
</form>
{% endblock %}
